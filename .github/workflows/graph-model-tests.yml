name: Graph model tests

on:
  push:
    paths:
      - "js/graph-model.js"
      - "tests/graph-model.test.mjs"
      - ".github/workflows/graph-model-tests.yml"
  pull_request:
    paths:
      - "js/graph-model.js"
      - "tests/graph-model.test.mjs"
      - ".github/workflows/graph-model-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare ES module copy
        run: cp js/graph-model.js /tmp/atero-graph-model.mjs

      - name: Run graph model tests
        run: node tests/graph-model.test.mjs
