name: Frontend tests

on:
  push:
    paths:
      - "index.html"
      - "css/**"
      - "js/**"
      - "tests/**"
      - ".github/workflows/graph-model-tests.yml"
  pull_request:
    paths:
      - "index.html"
      - "css/**"
      - "js/**"
      - "tests/**"
      - ".github/workflows/graph-model-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: |
          for file in js/*.js; do
            node --check "$file"
          done

      - name: Prepare graph model ES module copy
        run: cp js/graph-model.js /tmp/atero-graph-model.mjs

      - name: Run graph model tests
        run: node tests/graph-model.test.mjs

      - name: Run frontend structure tests
        run: node tests/frontend-structure.test.mjs
