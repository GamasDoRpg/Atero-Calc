name: Apply Graph cache bust

on:
  push:
    paths:
      - ".github/workflows/apply-cache-bust.yml"

permissions:
  contents: write

jobs:
  update-entrypoints:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace cached module URLs
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "index.html": [
                  ('src="js/bootstrap.js?v=3"', 'src="js/bootstrap-v2.js?v=1"'),
              ],
              "js/app.js": [
                  ('"./plot-v2.js?v=2"', '"./plot-v2.js?v=3"'),
                  ('"./plot-v2.js?v=1"', '"./plot-v2.js?v=3"'),
              ],
              "js/plot-v2.js": [
                  ('"./api.js?v=4"', '"./api.js?v=5"'),
                  ('"./plot-model.js?v=1"', '"./plot-model.js?v=2"'),
                  ('"./plot-renderer.js?v=1"', '"./plot-renderer.js?v=2"'),
              ],
              "tests/frontend-structure.test.mjs": [
                  ('/js\\/bootstrap\\.js\\?v=3/', '/js\\/bootstrap-v2\\.js\\?v=1/'),
                  ('/\\.\\/plot-v2\\.js\\?v=1/', '/\\.\\/plot-v2\\.js\\?v=3/'),
                  ('/\\.\\/plot-v2\\.js\\?v=2/', '/\\.\\/plot-v2\\.js\\?v=3/'),
              ],
          }

          for filename, pairs in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              original = text

              for old, new in pairs:
                  text = text.replace(old, new)

              if text == original:
                  print(f"No replacement needed in {filename}")
              else:
                  path.write_text(text, encoding="utf-8")
                  print(f"Updated {filename}")

          index = Path("index.html").read_text(encoding="utf-8")
          app = Path("js/app.js").read_text(encoding="utf-8")
          plot = Path("js/plot-v2.js").read_text(encoding="utf-8")

          assert 'src="js/bootstrap-v2.js?v=1"' in index
          assert '"./plot-v2.js?v=3"' in app
          assert '"./plot-renderer.js?v=2"' in plot
          assert '"./plot-model.js?v=2"' in plot
          assert '"./api.js?v=5"' in plot
          PY

      - name: Commit cache-busting URLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html js/app.js js/plot-v2.js tests/frontend-structure.test.mjs
          git diff --cached --quiet && exit 0
          git commit -m "Force fresh Graph renderer bundle"
          git push
